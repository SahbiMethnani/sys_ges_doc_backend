apiVersion: apps/v1
kind: Deployment
metadata:
  name: rag-api
  labels:
    app: rag-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rag-api
  template:
    metadata:
      labels:
        app: rag-api
    spec:
      containers:
        - name: rag-api
          image: rag-api:local
          imagePullPolicy: Never
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: DOCUMENTS_FOLDER
              value: /app/data/documents
            - name: LANCE_DB_PATH
              value: /app/data/lance_db
            - name: LLM_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: rag-api-config
                  key: LLM_BASE_URL
            - name: LLM_MODEL
              valueFrom:
                configMapKeyRef:
                  name: rag-api-config
                  key: LLM_MODEL
          volumeMounts:
            - name: app-data
              mountPath: /app/data
            - name: hf-cache
              mountPath: /root/.cache/huggingface
          readinessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 40
          livenessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: 420
            periodSeconds: 60
            timeoutSeconds: 15
          resources:
            requests:
              cpu: "250m"
              memory: "1Gi"
            limits:
              cpu: "2"
              memory: "4Gi"
      volumes:
        - name: app-data
          persistentVolumeClaim:
            claimName: rag-api-pvc
        - name: hf-cache
          emptyDir: {}
